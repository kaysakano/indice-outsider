const ORDEN = ['random','comics','manga'];
let modoEliminar = false;

function sortKey(n){ return n.replace(/^(The |Los |Las |El |La )/i,'').toLowerCase(); }

function renderSeccion(key){
  const arr = [...SECCIONES[key].artistas].sort((a,b) => sortKey(a.n).localeCompare(sortKey(b.n),'es'));
  const grupos = {};
  arr.forEach(a => {
    const l = sortKey(a.n)[0].toUpperCase();
    if(!grupos[l]) grupos[l] = [];
    grupos[l].push(a);
  });
  return Object.keys(grupos).sort().map(l => {
    const links = grupos[l].map(a => {
      const cls = modoEliminar ? ' class="del-mode"' : '';
      const oc = modoEliminar ? ` onclick="eliminar('${key}','${a.n.replace(/'/g,"\\'")}');return false;"` : '';
      return `<a href="${a.u}"${cls}${oc} target="_blank">${a.n}</a>`;
    }).join(' · ');
    return `<h2>${l}</h2><p class="artistas-line">${links}</p>`;
  }).join('');
}

function render(){
  document.getElementById('indice').innerHTML = ORDEN.map((key, i) =>
    `<div class="seccion-titulo"${i > 0 ? ' style="margin-top:52px"' : ''}>${SECCIONES[key].titulo}</div>` +
    renderSeccion(key)
  ).join('');
}

function abrirPanel(){ document.getElementById('panel').classList.add('open'); document.getElementById('inp-nombre').focus(); document.getElementById('msg-ok').style.display='none'; }
function cerrarPanel(){ document.getElementById('panel').classList.remove('open'); document.getElementById('inp-nombre').value=''; document.getElementById('inp-url').value=''; }

document.getElementById('inp-nombre').addEventListener('input', function(){
  const q = this.value.trim().replace(/ /g,'+');
  document.getElementById('inp-url').value = q ? 'https://www.tiendaoutsider.com.ar/search?q='+q : '';
});

function agregarArtista(){
  const nombre = document.getElementById('inp-nombre').value.trim();
  const url = document.getElementById('inp-url').value.trim();
  const key = document.getElementById('inp-seccion').value;
  if(!nombre){ alert('Ingresá el nombre'); return; }
  if(!url){ alert('Ingresá la URL'); return; }
  if(SECCIONES[key].artistas.find(a => a.n.toLowerCase() === nombre.toLowerCase())){ alert('Ya está en esa sección'); return; }
  SECCIONES[key].artistas.push({n:nombre, u:url});
  render();
  document.getElementById('msg-ok').style.display='block';
  document.getElementById('inp-nombre').value='';
  document.getElementById('inp-url').value='';
  document.getElementById('inp-nombre').focus();
}

function toggleDeleteMode(){
  modoEliminar = !modoEliminar;
  const btn = document.getElementById('btn-delete');
  btn.textContent = modoEliminar ? '✓ Salir' : '🗑 Eliminar';
  btn.classList.toggle('active', modoEliminar);
  render();
}

function eliminar(key, nombre){
  if(!confirm('¿Eliminar "'+nombre+'"?')) return;
  const arr = SECCIONES[key].artistas;
  arr.splice(arr.findIndex(a=>a.n===nombre), 1);
  render();
}

function descargarHTML(){
  const blob = new Blob([document.documentElement.outerHTML], {type:'text/html;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'random-comics-manga-anime.html';
  a.click();
}

document.addEventListener('keydown', e => { if(e.key==='Escape') cerrarPanel(); });
document.getElementById('panel').addEventListener('click', e => { if(e.target===document.getElementById('panel')) cerrarPanel(); });

render();
