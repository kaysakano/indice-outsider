<style>
  :root {
    --bg: #0d0d0d;

    --border: #333333;
    --text: #e0e0e0;
    --text-muted: #888888;
    --accent: #c8a96e;
    --accent-hover: #e0c080;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 24px 20px 20px;
    text-align: center;
  }

  header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
  }

  header p {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 6px;
    letter-spacing: 0.05em;
  }

  .controls {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .search-wrap {
    position: relative;
  }

  #buscador {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 16px 10px 40px;
    border-radius: 4px;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  #buscador:focus { border-color: var(--accent); }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  .filtros-genero {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .btn-genero {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .btn-genero:hover { color: var(--text); border-color: #666; }
  .btn-genero.activo { color: var(--bg); font-weight: 600; border-color: transparent; }

  .nav-letras {
    padding: 12px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  .nav-letras a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.8rem;
    padding: 3px 7px;
    border-radius: 3px;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }

  .nav-letras a:hover { color: var(--accent); }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }

  .letra-bloque {
    margin-bottom: 32px;
  }

  .letra-titulo {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
    margin-bottom: 14px;
    letter-spacing: 0.05em;
  }

  .artistas-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
  }

  .artista-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 14px;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    gap: 5px;
    transition: all 0.15s;
    cursor: pointer;
  }

  .artista-card:hover {
    border-color: var(--accent);
    background: var(--surface2);
    transform: translateY(-1px);
  }

  .artista-nombre {
    color: var(--text);
    font-size: 0.88rem;
    font-weight: 500;
    line-height: 1.3;
  }

  .artista-badge {
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 10px;
    display: inline-block;
    font-weight: 600;
    align-self: flex-start;
  }

  #sin-resultados {
    text-align: center;
    color: var(--text-muted);
    padding: 60px 20px;
    font-size: 0.95rem;
    display: none;
  }

  .contador {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-align: right;
    padding: 8px 20px 0;
    max-width: 900px;
    margin: 0 auto;
  }

  footer {
    text-align: center;
    padding: 30px 20px;
    color: var(--text-muted);
    font-size: 0.75rem;
    border-top: 1px solid var(--border);
    letter-spacing: 0.05em;
  }

  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>

const COLORES = {"Black Metal": "#9b30ff", "Death Metal": "#cc2200", "Thrash Metal": "#e05500", "Heavy Metal": "#888888", "Doom Metal": "#4a8a4e", "Power Metal": "#3a6abe", "Metal Progresivo": "#3a8aae", "Metalcore": "#8a4dc2", "Nu Metal": "#c27a00", "Hardcore - Grindcore - Groove Metal": "#cc3333", "Hard Rock": "#cc3333", "Glam Rock": "#cc44aa", "Dark - New Wave - Post Punk": "#4a6aae", "Punk Rock": "#aa7700", "Pop Punk": "#aa8800", "Folk": "#6a8a4a", "Funk": "#aa6600"};

let filtroGenero = 'todos';
let filtroBusqueda = '';

function badge(genero) {
  const color = COLORES[genero] || '#888';
  return `<span class="artista-badge" style="background:${color}22; color:${color}; border:1px solid ${color}44">${genero}</span>`;
}

function render() {
  const main = document.getElementById('main');
  const sinRes = document.getElementById('sin-resultados');
  const contador = document.getElementById('contador');

  const q = filtroBusqueda.toLowerCase().trim();

  const filtrados = ARTISTAS.filter(a => {
    const matchGenero = filtroGenero === 'todos' || a.genero === filtroGenero;
    const matchBusqueda = !q || a.nombre.toLowerCase().includes(q);
    return matchGenero && matchBusqueda;
  });

  contador.textContent = filtrados.length + ' artistas';

  // Agrupar por letra
  const grupos = {};
  filtrados.forEach(a => {
    const l = a.nombre[0].toUpperCase();
    if (!grupos[l]) grupos[l] = [];
    grupos[l].push(a);
  });

  const letrasOrdenadas = Object.keys(grupos).sort();

  if (filtrados.length === 0) {
    main.innerHTML = '';
    sinRes.style.display = 'block';
    return;
  }

  sinRes.style.display = 'none';

  main.innerHTML = letrasOrdenadas.map(l => `
    <div class="letra-bloque" id="letra-${l}">
      <div class="letra-titulo">${l}</div>
      <div class="artistas-grid">
        ${grupos[l].map(a => `
          <a class="artista-card" href="${a.url}" target="_blank">
            <span class="artista-nombre">${a.nombre}</span>
            ${badge(a.genero)}
          </a>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// Filtro género
document.querySelectorAll('.btn-genero').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.btn-genero').forEach(b => {
      b.classList.remove('activo');
      b.style.background = '';
      b.style.color = '';
    });
    btn.classList.add('activo');
    if (btn.dataset.genero === 'todos') {
      btn.style.background = '#c8a96e';
      btn.style.color = '#0d0d0d';
    } else {
      const c = COLORES[btn.dataset.genero] || '#888';
      btn.style.background = c;
      btn.style.color = '#0d0d0d';
    }
    filtroGenero = btn.dataset.genero;
    render();
  });
});

// Buscador
document.getElementById('buscador').addEventListener('input', e => {
  filtroBusqueda = e.target.value;
  render();
});

render();
</script>
